# Comparison run B — adamw_bnb_8bit (100 steps, same seed as run A)
# Pair with hint_compare_fp32.yaml for fp32 vs 8bit optim comparison.

model_name_or_path: /scratch/yh6210/transformers/Meta-Llama-3-8B-Instruct
model_revision: main
torch_dtype: bfloat16
attn_implementation: sdpa

dataset_name: /scratch/yh6210/open-r1/datasets/Hint_MMLU_cia
dataset_config: default
dataset_prompt_column: problem
dataset_train_split: train
dataset_test_split: validation

reward_funcs:
  - hint_accuracy
  - hint_parametric_faithfulness
reward_weights:
  - 1.0
  - 1.0

num_generations: 8
temperature: 1.0
top_p: 1.0
beta: 0.01
epsilon: 0.2
learning_rate: 1.0e-06
lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs:
  min_lr_rate: 0.1
warmup_ratio: 0.0
num_train_epochs: 1
max_steps: 100
max_prompt_length: 1024
max_completion_length: 1024

per_device_train_batch_size: 1
gradient_accumulation_steps: 2
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
bf16: true
use_liger_kernel: false
use_vllm: false
optim: adamw_bnb_8bit              # ← the comparison

log_completions: true
log_level: info
logging_first_step: true
logging_steps: 1
logging_strategy: steps
save_strategy: "no"
output_dir: /scratch/yh6210/open-r1/cia/compare_bnb8
overwrite_output_dir: true
push_to_hub: false
report_to:
  - wandb
wandb_project: cia-grpo
wandb_run_name: compare_bnb8_100steps
seed: 42
do_eval: false
eval_strategy: 'no'
per_device_eval_batch_size: 1
