# CIA GRPO recipe — TwoHopFact (paper §5)
# Usage:
#   accelerate launch --config_file recipes/accelerate_configs/zero3.yaml \
#     src/open_r1/grpo.py --config recipes/CIA/grpo/two_hop.yaml

# ─── Model ─────────────────────────────────────────────────────────────
model_name_or_path: /scratch/yh6210/transformers/gemma-2-9b-it
model_revision: main
torch_dtype: bfloat16
attn_implementation: sdpa

# ─── Data ──────────────────────────────────────────────────────────────
dataset_name: /scratch/yh6210/open-r1/datasets/TwoHopFact_cia
dataset_config: default
dataset_prompt_column: problem
dataset_train_split: train
dataset_test_split: validation
# No system prompt; the two-hop prompt template is embedded in the
# `problem` column from prep_two_hop_grpo.py.

# ─── Reward (paper §5.1): r = r_base + λ·𝟙(B_CoT==B_INT), λ=1.0 ────────
reward_funcs:
  - two_hop_accuracy
  - two_hop_parametric_faithfulness
reward_weights:
  - 1.0
  - 1.0

# ─── GRPO hyperparameters (paper §D.2) ─────────────────────────────────
num_generations: 16          # G = 16 sampled completions / prompt
temperature: 1.0             # T = 1.0 (paper §D.2)
top_p: 1.0
beta: 0.01                   # KL coefficient (paper §D.2)
epsilon: 0.2                 # PPO clipping (paper §D.2)
learning_rate: 1.0e-06
lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs:
  min_lr_rate: 0.1
warmup_ratio: 0.1
num_train_epochs: 2
max_prompt_length: 512
max_completion_length: 1024

# ─── Batching / memory ─────────────────────────────────────────────────
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
bf16: true
use_liger_kernel: false

# ─── Rollout acceleration ──────────────────────────────────────────────
use_vllm: false              # flip to true once multi-GPU setup is ready

# ─── Logging / saving ──────────────────────────────────────────────────
log_completions: true
log_level: info
logging_first_step: true
logging_steps: 10
logging_strategy: steps
save_strategy: epoch
save_total_limit: 2
output_dir: /scratch/yh6210/open-r1/cia/two_hop_gemma2_9b_grpo
overwrite_output_dir: true
hub_model_id: cia-two-hop-gemma2-9b-grpo
push_to_hub: false
report_to:
  - wandb
wandb_project: cia-grpo
wandb_run_name: two_hop-gemma2-9b-grpo
seed: 42
do_eval: false
eval_strategy: 'no'
per_device_eval_batch_size: 2
