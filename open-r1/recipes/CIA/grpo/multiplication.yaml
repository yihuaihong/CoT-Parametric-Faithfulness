# CIA GRPO recipe — 2-digit Multiplication (paper §5)
model_name_or_path: /scratch/yh6210/transformers/Meta-Llama-3-8B-Instruct
model_revision: main
torch_dtype: bfloat16
attn_implementation: sdpa

dataset_name: /scratch/yh6210/open-r1/datasets/Mult2d_cia
dataset_config: default
dataset_prompt_column: problem
dataset_train_split: train
dataset_test_split: validation

# The multiplication reward computes B_INT online from the completion
# (pp1+pp2 == final); no need for a pre-computed `labels` column.
reward_funcs:
  - multiplication_accuracy
  - multiplication_parametric_faithfulness
reward_weights:
  - 1.0
  - 1.0

num_generations: 16
temperature: 1.0
top_p: 1.0
beta: 0.01
epsilon: 0.2
learning_rate: 1.0e-06
lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs:
  min_lr_rate: 0.1
warmup_ratio: 0.1
num_train_epochs: 2
max_prompt_length: 1024
max_completion_length: 1024   # Approach B CoT needs more budget

per_device_train_batch_size: 2  # longer completions → smaller batch
gradient_accumulation_steps: 8
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
bf16: true
use_liger_kernel: false

use_vllm: false

log_completions: true
log_level: info
logging_first_step: true
logging_steps: 10
logging_strategy: steps
save_strategy: epoch
save_total_limit: 2
output_dir: /scratch/yh6210/open-r1/cia/mult_llama3_8b_grpo
overwrite_output_dir: true
hub_model_id: cia-mult-llama3-8b-grpo
push_to_hub: false
report_to:
  - wandb
wandb_project: cia-grpo
wandb_run_name: mult-llama3-8b-grpo
seed: 42
do_eval: false
eval_strategy: 'no'
per_device_eval_batch_size: 2
