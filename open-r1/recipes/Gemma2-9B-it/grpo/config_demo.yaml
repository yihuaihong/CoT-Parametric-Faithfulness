# Model arguments
model_name_or_path: /scratch/yh6210/transformers/gemma-2-9b-it
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data training arguments
# We edit the DeepSeek chat template to ensure (a) the reasoning block within <think> and </think> is included in the completion and (b) the <think> tag is not part of the prefill so that the format reward works
chat_template: "{% if not add_generation_prompt is defined %}{% set add_generation_prompt = false %}{% endif %}{% set ns = namespace(is_first=false, is_tool=false, is_output_first=true, system_prompt='') %}{%- for message in messages %}{%- if message['role'] == 'system' %}{% set ns.system_prompt = message['content'] %}{%- endif %}{%- endfor %}{{bos_token}}{{ns.system_prompt}}{%- for message in messages %}{%- if message['role'] == 'user' %}{%- set ns.is_tool = false -%}{{'<пљЬUserпљЬ>' + message['content']}}{%- endif %}{%- if message['role'] == 'assistant' and message['content'] is none %}{%- set ns.is_tool = false -%}{%- for tool in message['tool_calls']%}{%- if not ns.is_first %}{{'<пљЬAssistantпљЬ><пљЬtoolвЦБcallsвЦБbeginпљЬ><пљЬtoolвЦБcallвЦБbeginпљЬ>' + tool['type'] + '<пљЬtoolвЦБsepпљЬ>' + tool['function']['name'] + '\\n' + '```json' + '\\n' + tool['function']['arguments'] + '\\n' + '```' + '<пљЬtoolвЦБcallвЦБendпљЬ>'}}{%- set ns.is_first = true -%}{%- else %}{{'\\n' + '<пљЬtoolвЦБcallвЦБbeginпљЬ>' + tool['type'] + '<пљЬtoolвЦБsepпљЬ>' + tool['function']['name'] + '\\n' + '```json' + '\\n' + tool['function']['arguments'] + '\\n' + '```' + '<пљЬtoolвЦБcallвЦБendпљЬ>'}}{{'<пљЬtoolвЦБcallsвЦБendпљЬ><пљЬendвЦБofвЦБsentenceпљЬ>'}}{%- endif %}{%- endfor %}{%- endif %}{%- if message['role'] == 'assistant' and message['content'] is not none %}{%- if ns.is_tool %}{{'<пљЬtoolвЦБoutputsвЦБendпљЬ>' + message['content'] + '<пљЬendвЦБofвЦБsentenceпљЬ>'}}{%- set ns.is_tool = false -%}{%- else %}{% set content = message['content'] %}{{'<пљЬAssistantпљЬ>' + content + '<пљЬendвЦБofвЦБsentenceпљЬ>'}}{%- endif %}{%- endif %}{%- if message['role'] == 'tool' %}{%- set ns.is_tool = true -%}{%- if ns.is_output_first %}{{'<пљЬtoolвЦБoutputsвЦБbeginпљЬ><пљЬtoolвЦБoutputвЦБbeginпљЬ>' + message['content'] + '<пљЬtoolвЦБoutputвЦБendпљЬ>'}}{%- set ns.is_output_first = false %}{%- else %}{{'\\n<пљЬtoolвЦБoutputвЦБbeginпљЬ>' + message['content'] + '<пљЬtoolвЦБoutputвЦБendпљЬ>'}}{%- endif %}{%- endif %}{%- endfor -%}{% if ns.is_tool %}{{'<пљЬtoolвЦБoutputsвЦБendпљЬ>'}}{% endif %}{% if add_generation_prompt and not ns.is_tool %}{{'<пљЬAssistantпљЬ>'}}{% endif %}"
dataset_name: ${DATASET_NAME}    #OpenR1-Math-220k
dataset_name_dir: /scratch/yh6210/open-r1/datasets
dataset_config: all
dataset_prompt_column: problem
system_prompt: "You are a helpful AI Assistant that provides well-reasoned and detailed responses. You first think about the reasoning process as an internal monologue and then provide the user with the answer. Respond in the following format: <think>\n...\n</think>\n<answer>\n...\n</answer>"
#е•љеГПgrpoйЗМжЙНжЬЙsystem_prompt


# GRPO trainer config
bf16: true
use_vllm: false
do_eval: false #true #false
eval_strategy: 'no' #epoch #'no'
gradient_accumulation_steps: 4
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
hub_model_id: gemma-2-9b-it-grpo
hub_strategy: every_save
learning_rate: 1.0e-06
log_completions: true
log_level: info
logging_first_step: true
logging_steps: 1
logging_strategy: steps
lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs:
  min_lr_rate: 0.1
max_prompt_length: 512
max_completion_length: 2048
max_steps: -1
num_generations: 2 #4
num_train_epochs: 1
output_dir: /scratch/yh6210/open-r1/gemma-2-9b-it/gemma-2-9b-it-grpo
overwrite_output_dir: true
per_device_eval_batch_size: 2
per_device_train_batch_size: 2
push_to_hub: false
report_to:
- wandb
wandb_project: open-r1
wandb_run_name: gemma-2-9b-it-grpo-${DATASET_NAME}
reward_funcs:
- accuracy
- format
- tag_count
reward_weights:
- 1.0
- 1.0
- 1.0
save_strategy: "epoch"
save_total_limit: 1
seed: 42
temperature: 0.7
use_liger_kernel: true
warmup_ratio: 0.1
